# /etc/nginx/sites-available/lms-pplg
# IP-only setup: akses via http://192.168.111.151/
#
# PENTING soal /api: JANGAN proxy /api/ langsung ke backend (port 3001).
# Browser memanggil /api/* milik Next.js SENDIRI (frontend/app/api/**/route.ts),
# yang jalan server-side, membaca cookie httpOnly `token`, lalu baru proxy ke
# Nest.js backend pakai BACKEND_URL (server-to-server, tidak lewat Nginx).
# Kalau /api/ diarahkan ke Nest langsung, cookie tidak pernah ke-set -> login rusak.
# Jadi /api/* dibiarkan jatuh ke location "/" (port 3000, Next.js).
#
# - /            -> frontend Next.js (port 3000), termasuk /api/* miliknya sendiri
# - /uploads/    -> file statis backend (foto, ttd, PDF soal UKK, dst — express.static di Nest)

server {
    listen 80;
    listen [::]:80;
    server_name 192.168.111.151;

    client_max_body_size 25m;  # upload foto/PDF

    # ── File upload statis backend (LANGSUNG ke Nest, bukan lewat Next) ───
    location /uploads/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Frontend Next.js (termasuk /app/api/** route proxy Next sendiri) ──
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
